<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>ورود به مدیریت کاربران میکروتیک</title>
    <link rel="stylesheet" type="text/css" href="../css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/generic.js"></script>
    <script src="../js/login.js"></script>
</head>
<body class="login-body">
    
    <div class="login-wrapper">
        <div class="login-card">
            <form onsubmit="loginSubmited(); return false;">
                <div class="brand">
                    <img src="../img/mikrotik_logo.png" class="logo" alt="Mikrotik">
                    <h1>مدیریت کاربران</h1>
                    <div class="subtitle">لطفاً وارد حساب کاربری خود شوید</div>
                </div>

                <div style="width: 100%;">
                    <label for="username">نام کاربری</label>
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username" style="display:block; width:100%;">
                    
                    <label for="password">رمز عبور</label>
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password" style="display:block; width:100%;">
                </div>

                <div id="error-text" style="color:#fda4af; font-size: 0.85rem; text-align:center; min-height: 20px; margin-top:10px;"></div>
                
                <button type="submit" class="loginbtn" style="width: 100%; margin-top: 25px;">ورود به سیستم</button>
            </form>
        </div>

        <footer class="main-footer" style="border-top: 0; padding-top: 20px;">
            <div class="footer-text">
                <span>Built between pings by</span>
                <a href="https://ramtiin.ir" target="_blank">Ramtin</a>
                <span>@</span>
                <a href="https://netadminplus.com" target="_blank">NetAdminPlus</a>
                <span class="heart-icon">❤️</span>
            </div>
            <div class="social-links">
                <a href="https://github.com/netadminplus" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://www.linkedin.com/in/ramtin-rahmani/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="https://youtube.com/netadminplus" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="https://instagram.com/netadminplus" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </footer>
    </div>

</body>
</html>
